name: 🤖 Smart PR Bot

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, labeled, closed]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  # ── Job 1: Welcome + checklist on new PR ─────────────────────────────
  welcome-and-check:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'opened' || github.event.action == 'reopened')
    steps:
      - name: Welcome PR and validate description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr     = context.payload.pull_request;
            const sender = pr.user.login;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const num    = pr.number;
            const body   = pr.body || '';
            const title  = (pr.title || '').toLowerCase();
            const isFirst = pr.author_association === 'FIRST_TIME_CONTRIBUTOR' || pr.author_association === 'NONE';

            // ── MANDATORY labels on every PR ──
            const mandatoryLabels = ['gssoc:approved', 'mentor:leonagoel'];
            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: mandatoryLabels });
            } catch (e) {}

            // ── Additional labels from PR title ──
            const extraLabels = [];
            if (/bug|fix|hotfix|patch/.test(title))           extraLabels.push('type:bug');
            if (/feat|feature|add|new|implement/.test(title)) extraLabels.push('type:feature');
            if (/doc|readme|comment|typo/.test(title))        extraLabels.push('type:docs');
            if (/test|spec|coverage/.test(title))             extraLabels.push('type:testing');
            if (/refactor|cleanup/.test(title))               extraLabels.push('type:refactor');
            if (/frontend|ui|css|html/.test(title))           extraLabels.push('frontend');
            if (/backend|api|server|db/.test(title))          extraLabels.push('backend');
            extraLabels.push('status:review-needed');
            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: extraLabels });
            } catch (e) {}

            // ── Checklist validation ──
            const checks = {
              'What changed section': body.toLowerCase().includes('what changed'),
              'Why section':          body.toLowerCase().includes('why'),
              'How to test section':  body.toLowerCase().includes('how to test'),
              'Linked issue':         /closes\s*#\d+|fixes\s*#\d+|related issue/i.test(body),
              'Checklist completed':  body.includes('[x]') || body.includes('[X]'),
              'AI disclosure':        body.toLowerCase().includes('ai assistance') || body.toLowerCase().includes('did not use ai'),
            };
            const allGood = Object.values(checks).every(Boolean);
            const rows = Object.entries(checks)
              .map(([k,v]) => `| ${v ? '✅' : '❌'} | ${k} |`)
              .join('\n');

            const greeting = isFirst
              ? `🎉 **Welcome to Hybrid Recommender, @${sender}! This is your first contribution!**`
              : `👋 **Thanks for your PR, @${sender}!**`;

            await github.rest.issues.createComment({
              owner, repo, issue_number: num,
              body: [
                greeting,
                ``,
                `## 📋 PR Description Checklist`,
                `| Status | Item |`,
                `|--------|------|`,
                rows,
                allGood ? `\n> ✅ **PR description looks complete!**` : `\n> ⚠️ **Some required sections are missing.** Please update your PR description.`,
                ``,
                `## 🏷️ Labels Applied`,
                `- ✅ \`gssoc:approved\` — this PR counts for GSSoC leaderboard points`,
                `- ✅ \`mentor:leonagoel\` — mentor review points recorded`,
                ``,
                `## 🔄 What happens next`,
                `1. 🔍 **Review** by @${owner}`,
                `2. ✅ **CI checks** must pass`,
                `3. 🔀 **Auto-merge** triggers once approved`,
                `4. 🏆 **Points on leaderboard** at 4 AM IST`,
                ``,
                `⏱️ Respond to review comments within **48 hours**.`,
                `📖 [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)`,
              ].join('\n')
            });

      - name: Request review from owner
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr    = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            if (pr.user.login === owner) return;
            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number: pr.number,
                reviewers: [owner]
              });
            } catch (e) {}

  # ── Job 2: Ensure mandatory labels on every label event too ──────────
  ensure-mandatory-labels:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'labeled'
    steps:
      - name: Always ensure gssoc:approved and mentor:leonagoel are present
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr     = context.payload.pull_request;
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const num    = pr.number;
            const labels = pr.labels.map(l => l.name);
            const missing = ['gssoc:approved', 'mentor:leonagoel'].filter(l => !labels.includes(l));
            if (missing.length > 0) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: missing });
              } catch (e) {}
            }

  # ── Job 3: Add mentor label + comment when review submitted ──────────
  mentor-label-on-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review'
    steps:
      - name: Add mentor label and handle review state
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const review   = context.payload.review;
            const pr       = context.payload.pull_request;
            const reviewer = review.user.login;
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;
            const num      = pr.number;

            // Always add both mandatory labels on any review
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: num,
                labels: ['gssoc:approved', `mentor:${reviewer}`]
              });
            } catch (e) {}

            if (review.state === 'APPROVED') {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: num,
                  labels: ['status:approved']
                });
                await github.rest.issues.removeLabel({ owner, repo, issue_number: num, name: 'status:review-needed' });
              } catch (e) {}
              await github.rest.issues.createComment({
                owner, repo, issue_number: num,
                body: [
                  `## ✅ PR Approved by @${reviewer}`,
                  ``,
                  `| Label | Status |`,
                  `|-------|--------|`,
                  `| \`gssoc:approved\` | ✅ Applied — counts for GSSoC leaderboard |`,
                  `| \`mentor:${reviewer}\` | ✅ Applied — mentor review points recorded |`,
                  ``,
                  `🤖 **Auto-merging now...**`,
                ].join('\n')
              });

              // Auto-merge
              try {
                await github.rest.pulls.merge({
                  owner, repo, pull_number: num,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${num})`,
                });
              } catch (e) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: num,
                  body: `⏳ **Waiting for CI** — will auto-merge once all checks pass.`
                });
              }
            }

            if (review.state === 'CHANGES_REQUESTED') {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: ['status:changes-requested'] });
                await github.rest.issues.removeLabel({ owner, repo, issue_number: num, name: 'status:review-needed' });
              } catch (e) {}
              await github.rest.issues.createComment({
                owner, repo, issue_number: num,
                body: `## 🔄 Changes Requested by @${reviewer}\n\nPlease address the review comments and push your changes.\n\n⏱️ **48 hours** to respond or the PR may be closed.`
              });
            }

  # ── Job 4: Mandatory labels + comment on merge ───────────────────────
  on-pr-merged:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Post merge confirmation with GSSoC info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr    = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const num   = pr.number;

            // Final safety net — ensure mandatory labels exist on merged PR
            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: num,
                labels: ['gssoc:approved', 'mentor:leonagoel']
              });
            } catch (e) {}

            await github.rest.issues.createComment({
              owner, repo, issue_number: num,
              body: [
                `## 🎉 PR Merged! Contribution Counted for GSSoC`,
                ``,
                `| Label | Purpose |`,
                `|-------|---------|`,
                `| ✅ \`gssoc:approved\` | Your contribution points are recorded |`,
                `| ✅ \`mentor:leonagoel\` | Mentor review points recorded |`,
                ``,
                `**@${pr.user.login}** — your points will appear on the leaderboard at **4 AM IST**.`,
                ``,
                `🏆 [Check GSSoC Leaderboard](https://gssoc.girlscript.org/leaderboard)`,
                ``,
                `Thank you for contributing! 🚀`,
              ].join('\n')
            });