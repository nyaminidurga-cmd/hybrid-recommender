version: "3.9"

services:
  # ── Redis (message broker + result backend + response cache) ──────────────
  redis:
    image: redis:7-alpine
    container_name: hybridrec-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hybridrec

  # ── Celery worker (async model rebuild + recommendation tasks) ────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybridrec-celery
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hybridrec

  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybridrec-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./datasets:/app/datasets:ro   # mount datasets/ read-only
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - hybridrec

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: hybridrec-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hybridrec

networks:
  hybridrec:
    driver: bridge